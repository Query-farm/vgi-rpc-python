# Fluent Bit config: tail vgi-rpc access logs and ship to Azure Blob Storage.
# Auth: managed identity is preferred — set Auth_Type to "managed_identity".

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/vgi-rpc/access-*.jsonl
    Path_Key          source_path
    Parser            json
    Tag               vgi_rpc.access
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /var/lib/fluent-bit/vgi-rpc-access.db
    Buffer_Max_Size   1MB

[OUTPUT]
    Name             azure_blob
    Match            vgi_rpc.access
    account_name     myaccountname
    container_name   vgi-rpc-access-logs
    auth_type        managed_identity
    blob_type        appendblob
    compress         gzip
    path             vgi-rpc/%Y/%m/%d
