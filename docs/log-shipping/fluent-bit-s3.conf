# Fluent Bit config: tail vgi-rpc access logs and ship to AWS S3.
# Auth: instance profile / task role / pod identity / AWS_* env.

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/vgi-rpc/access-*.jsonl
    Path_Key          source_path
    Parser            json
    Tag               vgi_rpc.access
    Refresh_Interval  5
    Rotate_Wait       30
    DB                /var/lib/fluent-bit/vgi-rpc-access.db
    Buffer_Max_Size   1MB

[OUTPUT]
    Name                          s3
    Match                         vgi_rpc.access
    bucket                        my-vgi-rpc-access-logs
    region                        us-east-1
    s3_key_format                 /vgi-rpc/$TAG/%Y/%m/%d/%H/$UUID.jsonl.gz
    use_put_object                On
    compression                   gzip
    total_file_size               10M
    upload_timeout                60s
